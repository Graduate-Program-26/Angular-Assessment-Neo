<header class="flex items-center gap-6 px-6 py-4 bg-[#0f0b1a] border-b border-[#1d1633]">
  <span class="text-[#f5f3ff] font-bold text-xl"> MyDeezer App </span>

  <nav class="ml-auto">
    <ul class="flex gap-1 list-none m-0 p-0">
      <li>
        <a
          routerLink="/"
          routerLinkActive="bg-[#1d1633] !text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="block px-4 py-2 text-[#6d6a7c] rounded-lg transition-all duration-200 hover:bg-[#161126] hover:text-white"
        >
          Home
        </a>
      </li>

      <li>
        <a
          routerLink="/search"
          routerLinkActive="bg-[#1d1633] !text-white"
          class="block px-4 py-2 text-[#6d6a7c] rounded-lg transition-all duration-200 hover:bg-[#161126] hover:text-white"
        >
          Search
        </a>
      </li>

      <li>
        <a
          routerLink="/playlist"
          routerLinkActive="bg-[#1d1633] !text-white"
          class="block px-4 py-2 text-[#6d6a7c] rounded-lg transition-all duration-200 hover:bg-[#161126] hover:text-white"
        >
          Playlists
        </a>
      </li>
    </ul>
  </nav>
</header>
