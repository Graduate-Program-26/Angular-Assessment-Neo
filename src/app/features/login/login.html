<div class="min-h-screen bg-[#0f0b1a] flex items-center justify-center px-4">
  <div class="w-full max-w-sm flex flex-col items-center gap-8">

    <div class="flex flex-col items-center gap-2 text-center">
      <span class="text-[#f5f3ff] font-bold text-3xl">MyDeezer App</span>
      <p class="text-[#9290a0] text-sm">Sign in to continue</p>
    </div>

    <div class="w-full p-8 flex flex-col gap-4">

      @if (error()) {
        <p class="text-red-400 text-sm text-center">{{ error() }}</p>
      }

      <button
        (click)="signIn()"
        [disabled]="loading()"
        class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl bg-white text-[#1a1033] font-semibold text-sm hover:bg-gray-100 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
      >
        @if (loading()) {
          <svg class="animate-spin w-5 h-5 text-[#1a1033]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Signing in...
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-5 h-5" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.1-6.1C34.46 3.19 29.53 1 24 1 14.82 1 7.02 6.7 3.96 14.72l7.1 5.52C12.73 14.07 17.93 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.15 24.5c0-1.57-.14-3.09-.4-4.55H24v8.61h12.44c-.54 2.9-2.18 5.36-4.65 7.01l7.12 5.53c4.16-3.84 6.24-9.5 6.24-16.6z"/>
            <path fill="#FBBC05" d="M11.06 28.24A14.55 14.55 0 0 1 9.5 24c0-1.47.25-2.9.56-4.24l-7.1-5.52A23.93 23.93 0 0 0 0 24c0 3.86.93 7.5 2.56 10.72l7.1-5.52-.6-.96z"/>
            <path fill="#34A853" d="M24 47c5.53 0 10.17-1.83 13.56-4.97l-7.12-5.53c-1.83 1.23-4.17 1.96-6.44 1.96-6.07 0-11.27-4.57-13.1-10.72l-7.1 5.52C7.02 41.3 14.82 47 24 47z"/>
          </svg>
          Continue with Google
        }
      </button>
    </div>

  </div>
</div>
